  <!-- Botpress webchat — deferred via requestIdleCallback so it never blocks page load -->
  <script>
    (function () {
      var BP_INJECT = "https://cdn.botpress.cloud/webchat/v3.6/inject.js";
      var BP_CONFIG = "https://files.bpcontent.cloud/2026/05/18/07/20260518074608-4KEKFL8J.js";

      function loadBotpress() {
        // Skip on very slow mobile connections (2G/slow-2G) — retry later
        var conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        if (conn && (conn.effectiveType === "2g" || conn.effectiveType === "slow-2g")) {
          setTimeout(loadBotpress, 5000);
          return;
        }

        // Load inject.js first, then config
        var inject = document.createElement("script");
        inject.src = BP_INJECT;
        inject.async = true;
        inject.onload = function () {
          var config = document.createElement("script");
          config.src = BP_CONFIG;
          config.defer = true;
          document.body.appendChild(config);
        };
        document.body.appendChild(inject);
      }

      // Defer until the browser is idle — never block LCP / FID
      if ("requestIdleCallback" in window) {
        requestIdleCallback(loadBotpress, { timeout: 4000 });
      } else {
        setTimeout(loadBotpress, 2500);
      }
    })();
  </script>
