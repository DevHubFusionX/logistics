<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Preconnect to image hosts for faster LCP -->
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <!-- Preload LCP hero image so browser starts downloading before JS runs -->
    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1601584115197-04ecc0da31d7?auto=format&fit=crop&w=1280&q=75"
      fetchpriority="high"
    />
    <meta name="description" content="Dara Express - Global logistics and freight solutions connecting businesses worldwide with reliable, efficient shipping services." />
    <meta name="keywords" content="logistics, freight, shipping, cargo, delivery, transportation, Dara Express, global logistics, freight solutions" />
    <meta name="author" content="Dara Express" />
    <meta name="google-site-verification" content="EXtQcHJxNHUbdAwQT_yfow9G68plRWPEfVIUDPy2Oao" />
    <link rel="canonical" href="https://daraexpress.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://daraexpress.com" />
    <meta property="og:title" content="Dara Express - Global Logistics & Freight Solutions" />
    <meta property="og:description" content="Reliable freight and logistics services connecting businesses worldwide with efficiency and care." />
    <meta property="og:image" content="https://daraexpress.com/og-image.png" />
    <meta property="og:site_name" content="Dara Express" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://daraexpress.com" />
    <meta property="twitter:title" content="Dara Express - Global Logistics & Freight Solutions" />
    <meta property="twitter:description" content="Reliable freight and logistics services connecting businesses worldwide with efficiency and care." />
    <meta property="twitter:image" content="https://daraexpress.com/og-image.png" />

    <meta name="theme-color" content="#003366" />
    <title>Dara Express - Global Logistics & Freight Solutions</title>

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Dara Express",
      "url": "https://daraexpress.com",
      "logo": "https://daraexpress.com/favicon.svg",
      "description": "Global logistics and freight solutions connecting businesses worldwide.",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "Nigeria"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "09054610119",
        "contactType": "customer service"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Service",
      "serviceType": "Logistics and Freight",
      "provider": {
        "@type": "Organization",
        "name": "Dara Express"
      },
      "areaServed": "Global",
      "description": "Reliable freight shipping, cargo handling, and global logistics solutions."
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
